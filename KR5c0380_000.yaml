front:
  text: 諸真歌頌淵六
  hash: sha256:0004ea66dc995336cddb8bf0af3ee3f59681fe54cd277c0d82df9460c070aa5c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0380_HFL_000-001a, image: hfl/0615/0615-124.png}
body:
  text: 太微天帝君讃大有妙經頌丹暉映雲庭紫煙光玉林煥爛七寶花璀璨瑤靈音宫商自相和妙靈開人襟玄唱種福田廣度無界心天帝君讃大有妙經頌玄化本無迹有迹生道宗遨遊九天際息駕六領宫道暢虛漠內靈歌發太空形感至寂庭思詠希微通太帝君讃大有妙經頌翳翳元化初眇眇晨霞散太寂空玄上寥朗二儀判凝精抱空胎結化孕靈觀含真頥神內倐歘啓冥旦始悟憂促齡運交反天漢老君本生經頌衆生之本際寂然元起滅弱喪迷其根自與真源别妄作善惡緣禍福報無絶欲得苦海傾當使愛河竭守一固專柔持此無疪缺正智通群有妙慧摧諸結萬行混同歸三乘泯殊轍真靜離塵垢清涼無惱熱太上智慧徊玄經頌靈仙乘慶霄駕龍躡玄波洽真表嘉祥濯足八天河福應不我期故能釋天羅道德冠三界地網亦以過感遇靈真會淨慧經蓮華太上智慧經讃學仙絶華念念念相因積去來亂我神神躁靡不歷滅念停虛間蕭蕭入空寂請經若飢渴持志如金石保子飛玄路五靈度符籍本願大戒經頌學仙行為急奉戒制情心虛夷正氣居仙聖自相尋若不信法言胡為棲山林玉皇授歘生大洞三十九章與登龍臺歌飊飊三霞領徊剛七元蓋八景入太元飛灑九天外瓊扉生景雲靈煙絶幽藹西宫詠洞玄清唱扶桑際守雌森峯間玄吟五老會歘生有心哉與爾結中帶其二匏河振滄芒天津鼓萬流八風駕神霄緬緬虛中遊詠洞神明唱音為汝玄投歘生必至行肘伏塵中趨可為苦心哉當告爾所求西王母授紫度炎光神變經頌嘯歌九玄臺崖嶺凝凄端心理六覺暢目棄塵滓氛流霞耀金室虛堂散重玄積感致靈降形單道亦分修歘盻萬劫豈覺周億椿其二秀圃蔚神階朱扉瓊林庭流風鼓空洞玉籟乘虛鳴紫煙纏曲户丹暉映緑軿飛旗鬱玄蓋羽節耀紫清登景九霄際遨遊戲鳯城顧愛幽境子一樂同朝生其三騰轡控朗暉冥景洞野外流浪尋靈人合形慶霄際手披朱峊户朗若神沖泰金闕鬱嵳峩清景無塵穢解襟玄閬臺適我良願會脫屣三塗難保錬固年邁靈寶真一自然太上玄一真人頌衆妙出洞真煥爛曜太清奉者號仙人體無永長生逍遙戲玄虛宫殿羅無形蒨粲七寶林晃朗日月精龍驎交橫馳鳯凰翔悲鳴太上治紫臺衆真誦洞經捻香稽首禮旋行繞宫城三周歸髙座道王為應聲人主弘至道天下普安寧太上弘道頌太上玄虛宗弘道尊其經俯仰已得仙歷劫無數齡巍巍太真德寂寂因無生霄景結空棣乘虛自然征日月光炳灼安和樂未央方諸宫東華房靈妃歌曲紫桂植瑤園朱華聲悽悽月宫生蘂淵日中有瓊池左拔員靈曜右掣丹霞暉流金煥絳庭八景絶煙回緑蓋浮明朗控節命太微鳯精童華顔琳腴充長飢控晨挹太素乘歘翔玉墀吐納六虛氣玉嬪挹巾隨彈徴南雲扇香風鼓錦披叩商百獸舞六天攝神威倏歘億萬椿齡紀鬱巍巍小鮮未烹鼎言我巖下悲青童大君常吟詠欲植滅度根當拔生死栽沉吟墮九泉但坐惜形骸太虛真人常吟詠觀神載形時亦如車從馬車敗馬奔亡牽連一時假哀世但識此但是惜風火種罪天綱上受毒地獄下西城真人王君常吟詠形為渡神舟泊岸當别去形非神常宅神非形常載徘徊生死輪但苦心猶豫小有真人王君常吟詠失道從死津三魂迷生道生生日已逺死死日已早悲哉苦痛客根華巳顚倒起就零落塵焉知反枯老巳上四首詩去月秋分日瑶臺大會四君吟此言以和玄鈞廣韶之絃聲右英夫人説此郭四朝常乘小船遊戲塘中叩船而歌清池帶靈岫長林鬱青蔥玄鳥翔幽野悟言出從容鼓楫乘神波稽首希晨風未獲解脫期逍遙丘林中其二浪神九陔外研道遂全真戢此靈鳯羽藏我華龍鱗髙舉方寸物萬吹皆垢塵顧哀朝生蟪孰盡汝車輪其三遊空落非飊靈步無形方圓景煥明霞九鳯唱朝陽揮翮扇天津暗藹慶雲翔遂造太微宇挹此金梨漿逍遙玄陔表不存亦不亡其四駕歘舞神霄披霞帶九日髙皇齊龍輪遂造北華室神虎洞瓊林風雲合成一開闔幽冥户靈變玄迹滅保命仙君告許虎牙杜廣平常喜歌淳景翳廣林曖日東霞升晨風儛六煙勃鬱八道騰五嶽何必秀名山亦足陵矯手攝洞阜棲心潛中興吐納胎精氣玄白誰能勝西王毋宴漢武帝上元夫人彈雲林之璈歌步虛之曲昔涉玄真道騰步登太霞負笈造天關借問太上家忽過紫微垣真人列如麻渌景清飊起雲蓋映朱葩蘭宫敞珠扇碧空啓瓊沙丹臺結空棣暐曄生光華飛鳯踶甍峙燭龍倚逶蛇玉胎來絳芝九色紛相拏挹景練仙骸萬劫方童牙誰有壽前終扶桑不為查西王母又命侍女田四妃答歌晨登太靈宫挹此八王蘭夕入玄元闕採蘂撥琅玕濯足匏瓜河織女立津盤吐納挹景雲味之當一餐紫微何濟濟瓊輪服朱丹旦發汗漫府暮宿句陳垣去之道不同且各體所安二儀復猶存奚疑億萬椿莫與世人説行尸言此難王母贈魏夫人歌駕我八景輿歘然入玉清龍裙拂霄漢虎旗攝朱兵逍遙玄津際萬流無暫停哀此去留會劫盡天地傾當盡無中景不死亦無生體彼自然道寂觀合太冥南嶽挺真翰玉映曜頴精有任靡期事虛心自受靈嘉會絳河內相與樂未央雙禮珠彈雲璈而答歌玉清出九天神館飛霞外霄臺煥嵳峩靈夏秀蔚翳五雲興翠華八風扇緑氣仰吟消魔詠俯研智與慧萬真啓晨景唱期絳房會挺頴德音子神映乃拂沛天嶽凌空棣洞臺深幽邃遊海悟井隘履真覺世穢儛輪宴重空筌魚自然廢回我大椿羅長謝朝生世髙仙盼遊洞靈之曲玉室煥東霞紫輦浮絳晨華臺何盼目北宴飛天元清淨太無中眇眇躡景遷吟詠大洞章唱此三九篇曲寢大漠內神王方寸間寂室思靈暉何事苦林山須臾變衰翁回為孩中顔四真人降魏夫人歌丹明煥上清八風鼓太霞回我神霄輦遂造玉嶺阿咄嗟天地外九圍皆吾家上採日中精下飲黃月華靈觀空無中鵬路無間邪顧見魏賢安濁氣傷爾和勤研玄中思道成更相過方諸青童歌太霞扇晨暉九氣無常形玄轡飛霄外八景乘髙清手把玉皇被携我晨中生盼觀七曜房朗朗亦冥冥超哉魏氏子有心復有情玄挺自嘉會金書東華名賢安密所研相期暘谷汧次扶桑神王歌晨啓太帝室超越匏瓜水碧海飛翠波連岑赤嶽峙浮輪雲濤際九龍同轡起虎旗鬱霞津靈風翻然理華存久樂道遂致髙神擬拔徙三緣外感會乃方始相期陽洛宫道成携魏子次清虛真人歌駕歘控清虛徘徊西華館瓊林既神杪虎旗逐煙散慧風振丹旍明燭朗八煥解襟庸房裏神鈴鳴蒨粲棲景若林柯九絃玄中彈遺我積世憂釋此千年歎怡盼無極巳終夜復待旦其二紫霞儛玄空神風無綱領歘然滿八區祝爾豁虛靜八窗無常朗有冥亦有炅洞觀三丹田寂寂生形景凝神挺相遇雲姿卓鑠整愧無郢石運蓋彼自然頴勤密攝生道泄替結災眚靈期自有時携袂乃俱上人間可哀之曲天上人間會合踈稀日落西山兮夕烏歸飛百年一餉兮志與願違天宫咫尺兮恨不相隨巴謡歌神仙得者茅初成駕龍上升入太清時下玄洲戲赤城繼世而往在我盈帝君學之臘嘉平石安慶先作詩靈山造太霞豎巖絶霄峯紫煙散神州乘飊駕白龍相携四賔人東朝桑林公廣休年雖前壯氣何蒙蒙實未下路讓推年以相崇次張誘世作詩北遊太漠外來登蓬萊闕紫雲構靈宫香煙何鬱鬱美哉洛廣休久在論道位羅駢真人座齊觀白龍邁離式四人用何時共解帶有懷披襟犮欣欣髙晨會次許玉斧作詩遊觀竒山巘漱濯滄流清遙覩蓬萊間屹屹衝霄冥五芝被絳嵒四階槇琳瓊紛紛靈華散晃晃煥神庭從容七覺外任我攝天生自足方寸裏何用白龍榮次丁瑋寧作詩玄山構滄浪金房映靈軒洛公挺竒尚從容有無間形沉北寒宇三神接九天同寮相率往推我髙勝年弱冠石慶安未肯崇尊賢嘲笑蓬萊公呼此廣休前明公將何以却此少年翰吳王夫差書玄津流絳波崑碧映琅山朝日控晨輝薈艷何婉娫遊雲落太陽飊景凌三天靈寶曜九虛幽明鍾山間夏禹登八窗散氣響金蘭因枝振玉條緣波討洪源扶質立靈幹垂葉以結繁渺邈龍鳯迹煥爛九天翰仰挹三辰精保身永長安俯漱五華液還復反童顔騰神溫涼宫豈知熱與寒千秋似清旦萬歲猶日半鼓翼空同上要我靈寶官焚棼五帝駕俱墇景漠端相問飢與渴玄泉饒流丹永仙方寸內八遐無易難顧聞朱門臭當塗中有難銘碣勞巖隂冗岫可稽盤辛玄子詩疇昔入冥鄉順駕應靈招神隨空無散氣與慶雲消形非明玉質玄匠安能雕蹀足吟幽唱仰手玩鳴條林室有逸歡絶此軒外交遺景附圓曜嘉音何寥寥其二寂通寄興感玄氣攝動音髙輪雖參差萬仞故來尋蕭蕭研道子合神契靈襟委順浪世化心摽窈窕林同期理外遊相與靜東岑其三命駕廣酆阿逸迹幽𡨋鄉空中自有物有中亦無常悟言有無際相與會濠梁目擊玄解了鬼神理自忘太微玄清左夫人歌鬱藹非真墟太元為我館玄公豈有壞縈蒙孤所難落鳯控紫霞嬌轡登晨巘寂寂無濠涯暉暉空中觀隱芝秀鳯丘逡巡瑶林畔龍胎嬰爾形八瓊回素旦琅華繁玉宫結葩凌巖粲鵬扇絶億嶺拊翮扶霄翰西庭命長歌雲璈棄虛彈八風纏緑宇叢煙豁然散靈童擲流金火微啓辭案三元折腰舞紫皇揮袂讃朗朗扇景輝曄曄長庚煥超軿聳明刃下眄使我惋顧哀地仙輩何為棲林澗靈鳯歌杳杳靈鳯綿綿長歸悠悠我思永與願違萬劫無期何時來飛於是王所殺之鳯鬱然而生抱女俱飛徑入雲中去女仙張麗英石鼓歌石鼓石鼓悲哉下土自我來觀民生實苦哀哉世事悠悠我意我意不可辱兮王威不可奪余志有鸞有鳯自歌自舞凌雲歷漢逺絶塵羅世人之子其如我何暫來期會運往即乖父兮毋兮無傷我懷漢初童謡歌著青裙入天門揖金毋拜木公時人皆莫知之唯張子房知之乃往拜焉曰此乃東王公之玉童也言仙人得道升天當揖金毋而拜木公也自非沖虛登真之子莫知其津矣蕚緑華贈羊權詩神嶽排霄起飛峯鬱千尋寥籠靈谷虛瓊林蔚蕭森羊生標美秀弱冠流清音棲情莊惠津超形象魏林揚彩朱門中內外邁俗心其二我與夫子族源胄同淵池宏宗分上業於今各異枝蘭金因好著三益方覺彌其三靜尋欣斯會雅綜彌齡祀誰云幽鑒難得之方寸裏翹想樊籠外俱為山巖士無令騰虛翰中隨驚風起遷化雖由人藩羊未昜擬所期豈朝華歲暮於吾子九華安妃贈楊司命詩雲闕竪空上瓊臺竦鬱羅紫宫乘緑景靈觀藹嵳峩琅軒朱房內上德煥絳霞俯漱靈瓶津仰掇碧奈花濯足玊天池鼓枻牽牛河遂䇿景雲駕落龍轡玄阿振衣塵滓際褰裳步濁波願為山澤結剛桑順以和相携雙清內上真道不邪紫微會良謀唱納享福多其二駕歘發西華無待有待間或眄五嶽夆音峯或濯天河津釋輪尋虛舟所在皆纏綿芥子忽萬頃中有崑崙山小大固無殊逺近同一緣彼作有待來我作無待親中候王夫人詩龍旗儛太虛飛輪五嶽阿所在皆逍遙有感興冥歌無待喻有待相遇故得和滄浪奚足遼玄井不為多鬱絶尋步間俱會四海羅豈若絶明外三劫方一過其二八塗會無宗乘運觀囂羅化浮塵中際解襟有道家眄煙忽未傾携真造靈阿虛景磐瓊軒玄鈞作鳯歌適路無軌滯神音儛雲波齊德秀玉景何用世間多其三但觀夷天真去纍縱衆情體寂廢機駟崇有則攝生焉得齊物子委運任所經其四登軿發東華扇飊儛太玄飛轡騰九萬八落亦巳均暫眄山水際窈窕靈嶽間同風自齊氣道合理亦然龍芝永遐齡內觀攝天真東岑可長靜何為物所纏方丈臺昭靈李夫人詩雲墉帶天棣七氣煥神憑瓊扉啓晨鳴九音絳樞中紫霞與朱門香煙生緑窗四駕舞虎旗青軿擲玄空華蓋隨雲列落鳯控六龍䇿景五嶽阿三素眄君房適聞臊穢氣萬濁汚我胸臭物薰精神囂塵互相衝明玉皆璀爛何獨盛得躬髙揖苦不早坐地自生蟲其二縱酒觀群慧倐歘四落周不覺所以然實非有待遊相遇皆歡樂不遇亦不憂縱影玄空中兩會自然疇其三飛輪髙晨臺控轡玄壟隅手携紫皇被倐忽八風驅玉華翼緑幃青裙扇翠裙冠軒煥崔嵬珮玲帶月珠薄入風塵中塞鼻逃當除臭腥凋我氣百阿令心徂何不飊然起蕭蕭步太虛南極王夫人授楊羲詩控飊扇太虛八景飛髙清仰浮紫晨外俯看絶落溟玄心空同間上下弗流停無待兩際中有待無所營體無則能死體有則攝生東賔會髙唱二待何足爭其二命駕玉錦輪儛轡仰徘徊朝遊朱火宫夕宴夜光池浮景清霞杪八龍正參差我作無待遊有待輒見隨髙會佳人寢二待互是非有無非有定待待各自歸其三林振須類感雲鬱待龍吟玄數自相求觸節皆有音飛軿出西華總轡忽來尋八遐非無娛同詠理自欽悼此四維內百憂常在心俱遊北寒臺神風開爾襟紫微王夫人詩乘飊遡九天息駕三秀嶺有待徘徊盼無待固當靜滄浪奚足勞孰若越玄井又吟曰龜闕鬱巍巍墉臺落月珠列坐九靈房叩璈吟太無玉簫和我神金醴釋我憂又吟曰宴酣東華內陳鈞千百聲青君呼我起折腰希林庭羽帔扇翠暉玉佩何鏗零俱指髙晨殿相期象中冥又敘玄隴之遊吟曰超舉步絳霄飛飊北壟庭神華映仙臺圓曜隨風傾啓暉挹丹元扉景餐月精交被雲林宇浩軫還童嬰蕭蕭寄無宅是非豈能營世綱自擾競安可語養生九月六日夕雲林又降命楊君染筆喻作吟曰解輪太霞上斂轡造紫丘手把八天氣縱身空中浮一眄造化綱再視索髙疇道要既巳是可以解千憂求真得良友不去復何求吟此令示許長史穆及郗方回又吟紫空朗玄景玄宫帶絳河濟濟上清房靈臺煥嵳峩八輿造朱池羽蓋傾霄柯震風回三晨金鈴散玉華七轡降九陔宴眄不必家借問求道子何事坐塵波豈能棲東秀養真收太和亦令示許與郗十月十八日又與衆降命陽君書曰左把玉華蓋飛景躡七元三晨煥紫輝竦眄撫明真變踊期須臾四面皆巳神靈發無涯際勤思上清文何事坐橫途令爾感不專隂痾失玄機不覺年歲分徐謂楊君曰夫令勤者勤其事耽其玄微耳愼者亦觸類而作也學道之難不可書矣有恥鄙之心者於道亦遼乎灌秉然後可貴耳賢者之舉目更始爾今且當內忘也因吟曰玄清眇眇觀落景出東渟願得絶塵友蕭蕭罕世營吟此再三又曰靈人隱玄峯真人韜雲來玄唱非無期妙應自有待豈期虛空寂至韻固常在携襟登羽宫同宴廣寒裏借問朋人誰所存惟玊女吟竟曰卓雲虛之駿抗翮於崆洞之上斯人也豈不長挹南靣求謝千乘乎二月三十日吟一章曰褰裳濟渌河遂見扶桑公髙會太林墟賞宴玄華宫信道苟淳篤何不棲東峯四月十四日又作七章詞曰控景始揮津飛飊登上清雲臺鬱峩峩閶闔秀玉城晨風鼓丹霞朱煙灑金庭緑葉粲玄峯紫芝巖下生慶雲纏丹爐錬玉飛八瓊宴眄廣寒宫萬椿愈童嬰龍旗音斤啓靈電虎旗徴朱兵髙真回九曜洞觀均潛明誰能步幽道尋我無窮齡其二翳藹紫微館鬱臺散景飊鸞唱華蓋間鳯鈞導龍軺八狼携絳旌素虎吹角簫雲勃寫靈宫來適塵中囂解轡佳人所同氣自相招尋宗須臾頃萬齡乃一朝椿期會足衰劫往豈足遼真真乃相目莫令心徂抄虛刀揮至空鄙滯五神愁其三朝啓東晨暉飛軿越滄溟山波振青涯八風扇玄煙回眄易遷房有懷真感人三金可遊盤東岑宜永甄紛紛當途中孰能步生津其四飄颻八霞嶺徘徊飛晨蓋紫軿騰太虛曬眄九虛外玉簫激景雲靈煙絶幽藹髙仙宴太真清唱無涯際去來山嶽庭何事有待邁其五神玉曜靈津七元煥神扉虛遷方寸裏一躍登太微妙音乘和唱髙會亦有機齊此天人眄協彼晨景飛總轡六合外寧有傾與危其六薄宴塵飊嶺代謝緣還歸奚識靈劫期顧眄令人悲其七雲草廕玄方仰感旋曜精詵詵繁茂萌重德必克昌諸真歌頌
